name: Fetch bank transactions

on:
  schedule:
    # Every 15 minutes. Cron runs in UTC.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: fetch-transactions
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Restore Gmail OAuth files from secrets
        env:
          GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
        run: |
          printf '%s' "$GMAIL_CREDENTIALS_JSON" > credentials.json
          printf '%s' "$GMAIL_TOKEN_JSON" > token.json

      - name: Fetch and parse
        run: python fetch.py

      - name: Commit updated transactions.json
        run: |
          if git diff --quiet transactions.json; then
            echo "No changes."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add transactions.json
          git commit -m "chore: update transactions [skip ci]"
          git push
